<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subtitle Review Loop</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09101f;
      --panel: #111a2f;
      --panel-2: #172342;
      --line: #2d3a5f;
      --text: #edf3ff;
      --muted: #9dabcb;
      --accent: #68d8ff;
      --good: #80e37b;
      --warn: #ffcf66;
      --danger: #ff8a8a;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--text); background: var(--bg); }
    button, input, select, textarea { font: inherit; }
    button, .file-button, a.doc-link {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 36px; padding: 0 12px; border: 1px solid var(--line);
      border-radius: 8px; color: var(--text); background: var(--panel-2);
      text-decoration: none; cursor: pointer; white-space: nowrap;
    }
    button:hover, .file-button:hover, a.doc-link:hover { border-color: var(--accent); }
    button.primary { border-color: #2d9fc6; background: #0d5f80; }
    button.success { border-color: #56b85e; background: #1e7034; }
    input[type="file"] { display: none; }

    .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .topbar {
      display: flex; align-items: center; gap: 10px; min-height: 60px;
      padding: 10px 14px; border-bottom: 1px solid var(--line);
      background: #0e172b; overflow-x: auto;
    }
    .title { display: flex; flex-direction: column; min-width: 210px; line-height: 1.25; }
    .title strong { font-size: 16px; }
    .title span, .status { color: var(--muted); font-size: 12px; }
    .status { margin-left: auto; min-width: 240px; text-align: right; }

    .workspace { display: grid; grid-template-columns: minmax(430px, 45%) minmax(520px, 55%); min-height: 0; }
    .viewer {
      display: grid; grid-template-rows: auto auto auto 1fr; gap: 12px;
      min-width: 0; padding: 14px; border-right: 1px solid var(--line); background: #08101e;
    }
    .video-shell { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; display: block; background: #000; }
    .youtube-frame { width: 100%; height: 100%; display: none; border: 0; background: #000; }
    .video-shell.youtube-mode video { display: none; }
    .video-shell.youtube-mode .youtube-frame { display: block; }
    .burn-overlay {
      position: absolute; left: 5%; right: 5%; bottom: 22px; z-index: 2;
      display: flex; justify-content: center; pointer-events: none;
    }
    .burn-caption {
      max-width: 92%; text-align: center; white-space: pre-wrap; line-height: 1.28;
      font-family: "Microsoft JhengHei", sans-serif; font-size: 14px; font-weight: 700;
      color: #ffffff; -webkit-text-stroke: 1px #000000; text-shadow: none;
    }
    .player-controls, .stage-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .stage-tabs button { min-height: 42px; }
    .stage-tabs button.active { border-color: var(--accent); background: #123b55; }
    .youtube-import { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
    .youtube-import input {
      min-height: 38px; padding: 0 10px; border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); background: #0a1224; outline: none;
    }
    .youtube-import input:focus { border-color: var(--accent); }
    .source-link { display: none; margin-top: -6px; color: var(--muted); font-size: 12px; line-height: 1.35; word-break: break-all; }
    .source-link.active { display: block; }
    .source-link a { color: var(--accent); text-decoration: none; }
    .source-link a:hover { text-decoration: underline; }
    .cue-preview, .stage-panel, .settings-panel {
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--panel);
    }
    .cue-preview header, .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
    }
    .current-text { min-height: 86px; padding: 16px; display: grid; place-items: center; text-align: center; font-size: 22px; font-weight: 700; }

    .editor { display: grid; grid-template-rows: auto 1fr; min-width: 0; min-height: 0; background: #0c1426; }
    .editor-head { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; padding: 14px; border-bottom: 1px solid var(--line); background: #0e172b; }
    .metric { min-height: 62px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 4px; font-size: 22px; }
    .stage { min-height: 0; overflow: hidden; }
    .stage-panel { display: none; height: 100%; min-height: 0; }
    .stage-panel.active { display: grid; grid-template-rows: auto 1fr; }
    .tool-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
    .duration-tools { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 5px 6px; border: 1px solid var(--line); border-radius: 8px; background: #0a1224; }
    .duration-tools label { color: var(--muted); font-size: 12px; }
    .duration-tools input { width: 76px; min-height: 28px; padding: 0 8px; border: 1px solid var(--line); border-radius: 6px; color: var(--text); background: #091225; }
    .duration-tools button { min-height: 28px; padding: 0 9px; border-radius: 6px; }
    .jump-tools { display: inline-flex; align-items: center; gap: 6px; padding: 5px 6px; border: 1px solid var(--line); border-radius: 8px; background: #0a1224; }
    .jump-tools label { color: var(--muted); font-size: 12px; }
    .jump-tools input { width: 88px; min-height: 28px; padding: 0 8px; border: 1px solid var(--line); border-radius: 6px; color: var(--text); background: #091225; }
    .jump-tools button { min-height: 28px; padding: 0 9px; border-radius: 6px; }
    .search { flex: 1 1 240px; min-height: 36px; padding: 0 10px; border: 1px solid var(--line); border-radius: 8px; color: var(--text); background: #0a1224; outline: none; }
    .cue-list { min-height: 0; overflow: auto; padding: 12px 14px 20px; }
    .cue { display: grid; grid-template-columns: 84px 1fr; gap: 10px; margin-bottom: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
    .cue.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .cue.changed { border-color: #6b8b42; }
    .cue-meta { display: flex; flex-direction: column; gap: 7px; align-items: stretch; }
    .cue-number { color: var(--accent); font-weight: 700; font-size: 18px; }
    .time { color: var(--muted); font-size: 12px; line-height: 1.35; word-break: break-word; }
    .cue textarea { width: 100%; min-height: 78px; resize: vertical; padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; color: var(--text); background: #091225; outline: none; line-height: 1.45; }
    .cue textarea:focus { border-color: var(--accent); }
    .cue-body { display: grid; gap: 8px; min-width: 0; }
    .cue-time-tools { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; }
    .cue-time-tools input { width: 72px; min-height: 28px; padding: 0 7px; border: 1px solid var(--line); border-radius: 6px; color: var(--text); background: #091225; }
    .cue-time-tools button { min-height: 28px; padding: 0 8px; border-radius: 6px; }
    .cue-actions { display: grid; gap: 6px; }
    .cue-actions button.danger { border-color: #8f3f4b; background: #5c1f2a; }
    .cue-actions button:disabled { opacity: 0.45; cursor: not-allowed; }
    .duration-label { min-width: 72px; color: var(--accent); }
    .chip { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; padding: 0 8px; border: 1px solid var(--line); border-radius: 999px; color: var(--good); font-size: 12px; }
    .chip.warn { color: var(--warn); border-color: #80642c; }

    .settings-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; padding: 14px; overflow: auto; align-content: start; }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 13px; }
    .field input, .field select { min-height: 38px; padding: 0 10px; border: 1px solid var(--line); border-radius: 8px; color: var(--text); background: #0a1224; }
    .field input[type="color"] { padding: 3px; }
    .field.full { grid-column: 1 / -1; }
    .command-box { min-height: 96px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; color: #d9f3ff; background: #07101f; font-family: Consolas, monospace; white-space: pre-wrap; word-break: break-word; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.6; }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .viewer { border-right: 0; border-bottom: 1px solid var(--line); }
      .editor-head, .player-controls, .stage-tabs, .settings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <strong>字幕校稿與燒錄預覽</strong>
        <span>第一階段校稿，第二階段設定燒錄樣式</span>
      </div>
      <label class="file-button" for="videoFile">載入影片</label>
      <input id="videoFile" type="file" accept="video/*">
      <label class="file-button" for="srtFile">載入 SRT</label>
      <input id="srtFile" type="file" accept=".srt,text/plain">
      <button id="loadDefault" class="primary">手動載入專案預設</button>
      <button id="savePackage" class="success">儲存校稿包</button>
      <a class="doc-link" href="../docs/VIDEO-SUBTITLE-WORKFLOW.md" target="_blank">流程文件</a>
      <div id="status" class="status">準備載入字幕</div>
    </div>

    <main class="workspace">
      <section class="viewer">
        <div class="video-shell">
          <video id="video" controls preload="metadata"></video>
          <iframe id="youtubeFrame" class="youtube-frame" title="YouTube preview" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
          <div id="burnOverlay" class="burn-overlay"><div id="burnCaption" class="burn-caption"></div></div>
        </div>
        <div class="player-controls">
          <button id="back5">-5 秒</button>
          <button id="playPause">播放/暫停</button>
          <button id="forward5">+5 秒</button>
          <button id="loopCue">循環目前字幕</button>
        </div>
        <div class="youtube-import">
          <input id="youtubeUrl" type="url" placeholder="貼上 YouTube 影片網址">
          <button id="importYoutube" type="button">匯入 YouTube 字幕</button>
        </div>
        <div id="sourceUrlRow" class="source-link">目前來源：<a id="sourceUrlLink" href="#" target="_blank" rel="noreferrer"></a></div>
        <div class="stage-tabs">
          <button id="stageProofread" class="active">階段 1：字幕校稿</button>
          <button id="stageBurn">階段 2：燒錄預覽</button>
          <button id="downloadSrt">下載 SRT</button>
          <button id="applyRules">套用清理規則</button>
        </div>
        <div class="cue-preview">
          <header>
            <span id="currentMeta">尚未選取字幕</span>
            <span id="currentRuleState">等待載入</span>
          </header>
          <div id="currentText" class="current-text">請載入影片與字幕</div>
        </div>
      </section>

      <section class="editor">
        <div class="editor-head">
          <div class="metric"><span>字幕數</span><strong id="cueCount">0</strong></div>
          <div class="metric"><span>已修改</span><strong id="changedCount">0</strong></div>
          <div class="metric"><span>待檢查</span><strong id="warningCount">0</strong></div>
          <div class="metric"><span>目前時間</span><strong id="clock">00:00</strong></div>
        </div>

        <div class="stage">
          <section id="proofreadPanel" class="stage-panel active">
            <div class="tool-row">
              <input id="search" class="search" type="search" placeholder="搜尋字幕文字">
              <div class="jump-tools" aria-label="跳至字幕段落">
                <label for="jumpCueNumber">跳至段落</label>
                <input id="jumpCueNumber" type="number" min="1" step="1" inputmode="numeric" placeholder="編號">
                <button id="jumpCueButton" type="button">跳轉</button>
              </div>
              <div class="duration-tools" aria-label="全片字幕時長調整">
                <label for="globalDurationDelta">全片時長秒數</label>
                <input id="globalDurationDelta" type="number" min="0.1" max="30" step="0.1" value="0.5">
                <button id="shortenAllDurations" type="button">全部縮短</button>
                <button id="extendAllDurations" type="button">全部延長</button>
              </div>
              <button id="saveSrt">另存 SRT</button>
            </div>
            <div class="cue-list" id="cueList"></div>
          </section>

          <section id="burnPanel" class="stage-panel settings-panel">
            <div class="panel-head">
              <span>燒錄字幕樣式設定</span>
              <span>即時預覽僅用於確認視覺位置；正式輸出仍由 FFmpeg 產生</span>
            </div>
            <div class="settings-grid">
              <div class="field">
                <label for="fontFamily">字型</label>
                <select id="fontFamily">
                  <option>Microsoft JhengHei</option>
                  <option>Noto Sans TC</option>
                  <option>Arial</option>
                  <option>DFKai-SB</option>
                  <option>PingFang TC</option>
                </select>
              </div>
              <div class="field">
                <label for="fontSize">字體大小</label>
                <input id="fontSize" type="number" min="8" max="96" value="14">
              </div>
              <div class="field">
                <label for="fontColor">文字顏色</label>
                <input id="fontColor" type="color" value="#ffffff">
              </div>
              <div class="field">
                <label for="outlineColor">外框顏色</label>
                <input id="outlineColor" type="color" value="#000000">
              </div>
              <div class="field">
                <label for="outlineWidth">外框粗細</label>
                <input id="outlineWidth" type="number" min="0" max="8" step="0.5" value="1">
              </div>
              <div class="field">
                <label for="subtitlePosition">字幕位置</label>
                <select id="subtitlePosition">
                  <option value="bottom">底部</option>
                  <option value="middle">中間</option>
                  <option value="top">頂部</option>
                </select>
              </div>
              <div class="field">
                <label for="marginV">垂直邊距</label>
                <input id="marginV" type="number" min="0" max="300" value="22">
              </div>
              <div class="field">
                <label for="bold">粗體</label>
                <select id="bold">
                  <option value="1">啟用</option>
                  <option value="0">停用</option>
                </select>
              </div>
              <div class="field full">
                <label for="safeNote">輸出位置</label>
                <div id="safeNote" class="hint">
                  儲存校稿包後，伺服器會寫入 `workspace/review-output/`，包含修正後 SRT、燒錄設定 JSON、FFmpeg 樣式文字與 manifest。
                </div>
              </div>
              <div class="field full">
                <label>建議後續指令</label>
                <div id="commandBox" class="command-box"></div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const defaultSrtPath = "../workspace/media.rule-cleaned.srt";
    const defaultVideoPath = "../workspace/media.mp4";
    let outputFolder = "workspace/review-output";

    // Keep these browser cleanup rules aligned with src/apply_subtitle_rules.mjs.
    const termRules = [
      [/Whisper\s*Desktop/gi, "WHISPERDESKTOP"],
      [/\bwhisper\b/gi, "WHISPER"],
      [/\bEverkin\b/gi, "EVERCAM"],
      [/\bEvercam\b/gi, "EVERCAM"],
      [/\bEverCam\b/g, "EVERCAM"],
      [/\bopen\s*ai\b/gi, "OPENAI"],
      [/\bgpt[-\s]?4\b/gi, "GPT-4"],
      [/\bdall[-\s]?e\b/gi, "DALL-E"],
      [/\btoken\b/gi, "TOKEN"],
      [/\bdefault\b/gi, "DEFAULT"],
      [/\blms\b/gi, "LMS"],
      [/\bmoodle\b/gi, "MOODLE"],
      [/\be3\b/gi, "E3"],
      [/\bkm\s*plus\b/gi, "KMPLUS"],
      [/\bai\b/gi, "AI"],
      [/\bapi\b/gi, "API"]
    ];

    const fillerWords = ["你知道吧", "對吧", "那個", "這個", "然後", "就是", "呃", "啊", "嗯"];
    const fillerPattern = new RegExp(fillerWords.map(escapeRegExp).join("|"));
    const fillerPatternGlobal = new RegExp(fillerWords.map(escapeRegExp).join("|"), "g");
    const disallowedPunctuationPattern = /[，。,.、：:；;「」『』（）()《》〈〉【】\[\]“”"']/;
    const disallowedPunctuationPatternGlobal = /[，。,.、：:；;「」『』（）()《》〈〉【】\[\]“”"']/g;

    const state = {
      cues: [],
      activeIndex: -1,
      changed: new Set(),
      structureChanged: false,
      search: "",
      loopActive: false,
      playerMode: "local",
      youtubePlayer: null,
      youtubeReady: false,
      youtubeTimer: null,
      youtubeLoadTimeout: null,
      youtubeVideoId: "",
      pendingYoutubeSeek: null,
      videoPath: "",
      srtPath: ""
    };

    const ids = [
      "video", "cueList", "status", "currentText", "currentMeta", "currentRuleState",
      "cueCount", "changedCount", "warningCount", "clock", "burnCaption", "burnOverlay",
      "proofreadPanel", "burnPanel", "stageProofread", "stageBurn", "search", "commandBox",
      "globalDurationDelta", "jumpCueNumber", "jumpCueButton", "youtubeUrl", "importYoutube",
      "youtubeFrame", "sourceUrlRow", "sourceUrlLink"
    ];
    const el = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
    const settingIds = ["fontFamily", "fontSize", "fontColor", "outlineColor", "outlineWidth", "subtitlePosition", "marginV", "bold"];

    document.getElementById("videoFile").addEventListener("change", handleVideoFile);
    document.getElementById("srtFile").addEventListener("change", handleSrtFile);
    document.getElementById("loadDefault").addEventListener("click", loadDefaultAssets);
    document.getElementById("applyRules").addEventListener("click", applyRulesToAll);
    document.getElementById("downloadSrt").addEventListener("click", downloadSrt);
    document.getElementById("saveSrt").addEventListener("click", saveSrt);
    document.getElementById("savePackage").addEventListener("click", saveReviewPackage);
    el.importYoutube.addEventListener("click", importYoutubeSubtitles);
    el.youtubeUrl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") importYoutubeSubtitles();
    });
    document.getElementById("shortenAllDurations").addEventListener("click", () => adjustAllDurations(-getGlobalDurationDelta()));
    document.getElementById("extendAllDurations").addEventListener("click", () => adjustAllDurations(getGlobalDurationDelta()));
    document.getElementById("back5").addEventListener("click", () => seekBySeconds(-5));
    document.getElementById("forward5").addEventListener("click", () => seekBySeconds(5));
    document.getElementById("playPause").addEventListener("click", togglePlayback);
    document.getElementById("loopCue").addEventListener("click", () => {
      state.loopActive = !state.loopActive;
      document.getElementById("loopCue").classList.toggle("primary", state.loopActive);
    });
    el.stageProofread.addEventListener("click", () => setStage("proofread"));
    el.stageBurn.addEventListener("click", () => setStage("burn"));
    el.search.addEventListener("input", (event) => {
      state.search = event.target.value.trim();
      renderCueList();
    });
    el.jumpCueButton.addEventListener("click", jumpToCueFromInput);
    el.jumpCueNumber.addEventListener("keydown", (event) => {
      if (event.key === "Enter") jumpToCueFromInput();
    });
    settingIds.forEach((id) => document.getElementById(id).addEventListener("input", updateBurnPreview));

    el.video.addEventListener("timeupdate", () => {
      if (state.playerMode !== "local") return;
      updatePlaybackTime(el.video.currentTime);
    });

    loadInitialProjectFromQuery();
    updateBurnPreview();

    async function loadInitialProjectFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const srtPath = params.get("srt");
      const videoPath = params.get("video");
      const youtubeUrl = params.get("youtube");
      const projectFolder = params.get("project");

      if (!srtPath && !videoPath && !youtubeUrl) {
        resetEditorState("請載入影片與字幕，或貼上 YouTube 網址匯入");
        return;
      }

      outputFolder = projectFolder ? `${projectFolder.replace(/\/+$/, "")}/review-output` : "workspace/review-output";

      if (youtubeUrl) {
        el.youtubeUrl.value = youtubeUrl;
        updateSourceUrlDisplay(youtubeUrl);
        showYoutubePreview(youtubeUrl);
        state.videoPath = youtubeUrl;
      } else if (videoPath) {
        updateSourceUrlDisplay("");
        showLocalVideo();
        el.video.src = toBrowserPath(videoPath);
        state.videoPath = videoPath;
      }

      if (srtPath) {
        try {
          const response = await fetch(toBrowserPath(srtPath), { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.srtPath = srtPath;
          loadSrtText(await response.text(), `已載入本次專案：${projectFolder || srtPath}`);
        } catch (error) {
          statusMessage(`本次專案字幕載入失敗：${error.message}`);
        }
      } else {
        renderCueList();
        updateStats();
        statusMessage("已載入影片，請再載入字幕");
      }
    }

    async function loadDefaultAssets() {
      showLocalVideo();
      updateSourceUrlDisplay("");
      el.video.src = defaultVideoPath;
      outputFolder = "workspace/review-output";
      state.videoPath = "workspace/media.mp4";
      state.srtPath = "workspace/media.rule-cleaned.srt";
      try {
        const response = await fetch(defaultSrtPath, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        loadSrtText(await response.text(), "已載入專案預設影片與字幕");
      } catch (error) {
        statusMessage("找不到預設 SRT，請確認 workspace/media.rule-cleaned.srt 是否存在");
      }
    }

    function handleVideoFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      el.video.src = URL.createObjectURL(file);
      showLocalVideo();
      updateSourceUrlDisplay("");
      state.videoPath = file.name;
      outputFolder = "workspace/review-output";
      statusMessage(`已載入影片：${file.name}`);
    }

    async function handleSrtFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      state.srtPath = file.name;
      loadSrtText(await file.text(), `已載入字幕：${file.name}`);
    }

    function loadSrtText(text, message) {
      state.cues = parseSrt(text);
      state.activeIndex = -1;
      state.changed.clear();
      state.structureChanged = false;
      renderCueList();
      updateStats();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
      statusMessage(message);
    }

    function resetEditorState(message) {
      state.cues = [];
      state.activeIndex = -1;
      state.changed.clear();
      state.structureChanged = false;
      state.search = "";
      state.videoPath = "";
      state.srtPath = "";
      el.search.value = "";
      el.youtubeUrl.value = "";
      updateSourceUrlDisplay("");
      showLocalVideo();
      el.video.removeAttribute("src");
      el.video.load();
      renderCueList();
      updateStats();
      setActiveCue(-1);
      updateBurnPreview();
      statusMessage(message);
    }

    function setStage(stage) {
      const burn = stage === "burn";
      el.proofreadPanel.classList.toggle("active", !burn);
      el.burnPanel.classList.toggle("active", burn);
      el.stageProofread.classList.toggle("active", !burn);
      el.stageBurn.classList.toggle("active", burn);
      updateBurnPreview();
    }

    function parseSrt(text) {
      return text.replace(/^\uFEFF/, "")
        .trim()
        .split(/\r?\n\r?\n/)
        .map((block, index) => {
          const lines = block.split(/\r?\n/);
          const timingIndex = lines.findIndex((line) => line.includes("-->"));
          const timing = timingIndex >= 0 ? lines[timingIndex] : "";
          const match = timing.match(/^(\d{2}:\d{2}:\d{2},\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2},\d{3})/);
          const textLines = timingIndex >= 0 ? lines.slice(timingIndex + 1) : lines.slice(2);
          return {
            id: index + 1,
            startRaw: match ? match[1] : "00:00:00,000",
            endRaw: match ? match[2] : "00:00:00,000",
            start: match ? parseTime(match[1]) : 0,
            end: match ? parseTime(match[2]) : 0,
            text: textLines.join("\n").trim(),
            originalText: textLines.join("\n").trim(),
            originalStart: match ? parseTime(match[1]) : 0,
            originalEnd: match ? parseTime(match[2]) : 0
          };
        })
        .filter((cue) => cue.text || cue.end > cue.start);
    }

    function renderCueList() {
      el.cueList.innerHTML = "";
      const fragment = document.createDocumentFragment();
      const query = state.search.toLowerCase();
      state.cues.forEach((cue, index) => {
        if (query && !cue.text.toLowerCase().includes(query)) return;
        const item = document.createElement("article");
        item.className = "cue";
        if (index === state.activeIndex) item.classList.add("active");
        if (state.changed.has(index)) item.classList.add("changed");
        item.dataset.index = String(index);
        item.innerHTML = `
          <div class="cue-meta">
            <div class="cue-number">#${index + 1}</div>
            <div class="time">${cue.startRaw}<br>${cue.endRaw}</div>
            <button type="button" data-action="jump" title="跳到此字幕">跳轉</button>
            <span class="${hasRuleWarning(cue.text) ? "chip warn" : "chip"}">${hasRuleWarning(cue.text) ? "待檢查" : "OK"}</span>
            <div class="cue-actions">
              <button type="button" data-action="merge" ${index >= state.cues.length - 1 ? "disabled" : ""}>合併下句</button>
              <button type="button" data-action="delete" class="danger">刪除</button>
            </div>
          </div>
          <div class="cue-body">
            <textarea aria-label="字幕 ${index + 1}">${escapeHtml(cue.text)}</textarea>
            <div class="cue-time-tools" aria-label="調整第 ${index + 1} 句字幕時長">
              <span class="duration-label">時長 ${formatDuration(cue.end - cue.start)}</span>
              <input type="number" min="0.1" max="30" step="0.1" value="${escapeHtml(String(el.globalDurationDelta.value || "0.5"))}" aria-label="單句調整秒數">
              <button type="button" data-action="shorten">縮短</button>
              <button type="button" data-action="extend">延長</button>
            </div>
          </div>
        `;
        item.querySelector('[data-action="jump"]').addEventListener("click", () => jumpToCue(index));
        item.querySelector('[data-action="merge"]').addEventListener("click", () => mergeCueWithNext(index));
        item.querySelector('[data-action="delete"]').addEventListener("click", () => deleteCue(index));
        item.querySelector("textarea").addEventListener("input", (event) => updateCue(index, event.target.value));
        item.querySelector('[data-action="shorten"]').addEventListener("click", () => {
          const delta = readCueDurationDelta(item);
          adjustCueDuration(index, -delta);
        });
        item.querySelector('[data-action="extend"]').addEventListener("click", () => {
          const delta = readCueDurationDelta(item);
          adjustCueDuration(index, delta);
        });
        fragment.appendChild(item);
      });
      el.cueList.appendChild(fragment);
      updateStats();
    }

    function updateCue(index, value) {
      state.cues[index].text = value;
      syncChangedState(index);
      const cueNode = el.cueList.querySelector(`[data-index="${index}"]`);
      if (cueNode) {
        cueNode.classList.toggle("changed", state.changed.has(index));
        const chip = cueNode.querySelector(".chip");
        const warning = hasRuleWarning(value);
        chip.textContent = warning ? "待檢查" : "OK";
        chip.classList.toggle("warn", warning);
      }
      updateStats();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
    }

    async function importYoutubeSubtitles() {
      const url = el.youtubeUrl.value.trim();
      if (!url) {
        statusMessage("請先貼上 YouTube 影片網址");
        return;
      }

      el.importYoutube.disabled = true;
      statusMessage("正在匯入 YouTube 字幕，較長影片可能需要一段時間");
      try {
        const response = await fetch("/api/youtube-ingest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, rulePath: "workspace/rule.txt" })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || `HTTP ${response.status}`);

        const subtitleResponse = await fetch(`../${result.subtitle}`, { cache: "no-store" });
        if (!subtitleResponse.ok) throw new Error(`字幕載入失敗：HTTP ${subtitleResponse.status}`);

        state.videoPath = result.sourceUrl;
        state.srtPath = result.subtitle;
        outputFolder = `${result.folder}/review-output`;
        updateSourceUrlDisplay(result.sourceUrl);
        showYoutubePreview(url);
        loadSrtText(await subtitleResponse.text(), `已匯入 YouTube 字幕：${result.folder}`);
      } catch (error) {
        statusMessage(`YouTube 匯入失敗：${error.message}`);
      } finally {
        el.importYoutube.disabled = false;
      }
    }

    function showYoutubePreview(url) {
      const videoId = extractYoutubeId(url);
      if (!videoId) return;
      state.playerMode = "youtube";
      state.youtubeReady = false;
      state.youtubeVideoId = videoId;
      state.pendingYoutubeSeek = null;
      el.youtubeFrame.src = youtubeEmbedSrc(videoId);
      el.video.closest(".video-shell").classList.add("youtube-mode");
      statusMessage("正在載入 YouTube 預覽，字幕可先校稿");
      if (state.youtubeLoadTimeout) window.clearTimeout(state.youtubeLoadTimeout);
      state.youtubeLoadTimeout = window.setTimeout(() => {
        if (!state.youtubeReady && state.playerMode === "youtube") {
          statusMessage("YouTube 預覽載入較久，仍可先編輯字幕或使用段落跳轉");
        }
      }, 8000);
      ensureYoutubeApi().then(() => {
        if (state.youtubePlayer?.loadVideoById) {
          state.youtubeReady = true;
          if (state.youtubeLoadTimeout) window.clearTimeout(state.youtubeLoadTimeout);
          state.youtubePlayer.loadVideoById(videoId);
          applyPendingYoutubeSeek();
          startYoutubeTimer();
          return;
        }
        state.youtubePlayer = new YT.Player("youtubeFrame", {
          videoId,
          events: {
            onReady: () => {
              state.youtubeReady = true;
              if (state.youtubeLoadTimeout) window.clearTimeout(state.youtubeLoadTimeout);
              applyPendingYoutubeSeek();
              startYoutubeTimer();
            },
            onStateChange: () => startYoutubeTimer(),
            onError: () => statusMessage("YouTube 預覽載入失敗，請確認影片權限或直接在 YouTube 開啟來源網址")
          }
        });
      });
    }

    function showLocalVideo() {
      state.playerMode = "local";
      stopYoutubeTimer();
      if (state.youtubePlayer?.stopVideo) state.youtubePlayer.stopVideo();
      state.youtubeReady = false;
      state.youtubeVideoId = "";
      state.pendingYoutubeSeek = null;
      if (state.youtubeLoadTimeout) window.clearTimeout(state.youtubeLoadTimeout);
      el.video.closest(".video-shell").classList.remove("youtube-mode");
    }

    function youtubeEmbedSrc(videoId, startSeconds = 0) {
      const params = new URLSearchParams({
        enablejsapi: "1",
        origin: location.origin,
        playsinline: "1"
      });
      if (startSeconds > 0) params.set("start", String(Math.floor(startSeconds)));
      return `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
    }

    function applyPendingYoutubeSeek() {
      if (state.pendingYoutubeSeek == null || !state.youtubeReady || !state.youtubePlayer?.seekTo) return;
      state.youtubePlayer.seekTo(Math.max(0, state.pendingYoutubeSeek), true);
      updatePlaybackTime(Math.max(0, state.pendingYoutubeSeek));
      state.pendingYoutubeSeek = null;
    }

    function ensureYoutubeApi() {
      if (window.YT?.Player) return Promise.resolve();
      if (window.youtubeApiPromise) return window.youtubeApiPromise;
      window.youtubeApiPromise = new Promise((resolve) => {
        const previous = window.onYouTubeIframeAPIReady;
        window.onYouTubeIframeAPIReady = () => {
          if (typeof previous === "function") previous();
          resolve();
        };
        const script = document.createElement("script");
        script.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(script);
      });
      return window.youtubeApiPromise;
    }

    function startYoutubeTimer() {
      if (state.youtubeTimer) return;
      state.youtubeTimer = window.setInterval(() => {
        if (state.playerMode !== "youtube" || !state.youtubeReady || !state.youtubePlayer?.getCurrentTime) return;
        updatePlaybackTime(state.youtubePlayer.getCurrentTime());
      }, 250);
    }

    function stopYoutubeTimer() {
      if (!state.youtubeTimer) return;
      window.clearInterval(state.youtubeTimer);
      state.youtubeTimer = null;
    }

    function updatePlaybackTime(seconds) {
      updateActiveCue(seconds);
      el.clock.textContent = formatClock(seconds);
      if (state.loopActive && state.activeIndex >= 0) {
        const cue = state.cues[state.activeIndex];
        if (seconds > cue.end) seekToSeconds(cue.start);
      }
    }

    function seekBySeconds(delta) {
      const nextTime = Math.max(0, getPlaybackTime() + delta);
      seekToSeconds(nextTime);
    }

    function getPlaybackTime() {
      if (state.playerMode === "youtube" && state.youtubeReady && state.youtubePlayer?.getCurrentTime) {
        return state.youtubePlayer.getCurrentTime();
      }
      return el.video.currentTime || 0;
    }

    function seekToSeconds(seconds) {
      if (state.playerMode === "youtube" && state.youtubeReady && state.youtubePlayer?.seekTo) {
        state.youtubePlayer.seekTo(Math.max(0, seconds), true);
        updatePlaybackTime(Math.max(0, seconds));
        return;
      }
      if (state.playerMode === "youtube") {
        const nextTime = Math.max(0, seconds);
        state.pendingYoutubeSeek = nextTime;
        if (state.youtubeVideoId) el.youtubeFrame.src = youtubeEmbedSrc(state.youtubeVideoId, nextTime);
        updatePlaybackTime(nextTime);
        return;
      }
      el.video.currentTime = Math.max(0, seconds);
    }

    function togglePlayback() {
      if (state.playerMode === "youtube" && state.youtubeReady && state.youtubePlayer) {
        const playerState = state.youtubePlayer.getPlayerState?.();
        if (playerState === YT.PlayerState.PLAYING) state.youtubePlayer.pauseVideo();
        else state.youtubePlayer.playVideo();
        startYoutubeTimer();
        return;
      }
      el.video.paused ? el.video.play() : el.video.pause();
    }

    function extractYoutubeId(value) {
      try {
        const url = new URL(value);
        if (url.hostname.includes("youtu.be")) return url.pathname.split("/").filter(Boolean)[0] || "";
        return url.searchParams.get("v") || "";
      } catch {
        return "";
      }
    }

    function updateSourceUrlDisplay(url) {
      const value = String(url || "").trim();
      el.sourceUrlRow.classList.toggle("active", Boolean(value));
      el.sourceUrlLink.textContent = value;
      if (value) {
        el.sourceUrlLink.href = value;
      } else {
        el.sourceUrlLink.removeAttribute("href");
      }
    }

    function toBrowserPath(value) {
      if (/^https?:\/\//i.test(value)) return value;
      return `../${String(value).replace(/^\/+/, "")}`;
    }

    function readCueDurationDelta(cueNode) {
      const input = cueNode.querySelector(".cue-time-tools input");
      const value = Number(input?.value);
      return Number.isFinite(value) && value > 0 ? value : getGlobalDurationDelta();
    }

    function getGlobalDurationDelta() {
      const value = Number(el.globalDurationDelta.value);
      return Number.isFinite(value) && value > 0 ? value : 0.5;
    }

    function adjustAllDurations(delta) {
      if (!state.cues.length) {
        statusMessage("尚未載入字幕，無法調整時長");
        return;
      }
      let adjusted = 0;
      state.cues.forEach((cue, index) => {
        if (applyCueDurationDelta(index, delta)) adjusted += 1;
      });
      renderCueList();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
      statusMessage(`${delta > 0 ? "已延長" : "已縮短"}全片 ${adjusted} 句字幕時長 ${Math.abs(delta).toFixed(1)} 秒`);
    }

    function adjustCueDuration(index, delta) {
      if (!state.cues[index]) return;
      const changed = applyCueDurationDelta(index, delta);
      updateCueTimingNode(index);
      updateStats();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
      statusMessage(changed
        ? `已${delta > 0 ? "延長" : "縮短"}第 ${index + 1} 句字幕 ${Math.abs(delta).toFixed(1)} 秒`
        : `第 ${index + 1} 句已達可調整範圍邊界`);
    }

    function applyCueDurationDelta(index, delta) {
      const cue = state.cues[index];
      const minDuration = 0.1;
      const nextStart = state.cues[index + 1]?.start ?? Number.POSITIVE_INFINITY;
      const upperLimit = Number.isFinite(nextStart) ? Math.max(cue.start + minDuration, nextStart - 0.001) : Number.POSITIVE_INFINITY;
      const targetEnd = cue.end + delta;
      const nextEnd = Math.min(Math.max(targetEnd, cue.start + minDuration), upperLimit);
      if (Math.abs(nextEnd - cue.end) < 0.001) return false;
      cue.end = roundTime(nextEnd);
      cue.endRaw = formatSrtTime(cue.end);
      syncChangedState(index);
      return true;
    }

    function syncChangedState(index) {
      const cue = state.cues[index];
      const textChanged = cue.text !== cue.originalText;
      const timingChanged = Math.abs(cue.start - cue.originalStart) > 0.001 || Math.abs(cue.end - cue.originalEnd) > 0.001;
      if (textChanged || timingChanged) state.changed.add(index);
      else state.changed.delete(index);
    }

    function updateCueTimingNode(index) {
      const cue = state.cues[index];
      const cueNode = el.cueList.querySelector(`[data-index="${index}"]`);
      if (!cueNode) return;
      cueNode.classList.toggle("changed", state.changed.has(index));
      const time = cueNode.querySelector(".time");
      if (time) time.innerHTML = `${cue.startRaw}<br>${cue.endRaw}`;
      const duration = cueNode.querySelector(".duration-label");
      if (duration) duration.textContent = `時長 ${formatDuration(cue.end - cue.start)}`;
    }

    function deleteCue(index) {
      if (!state.cues[index]) return;
      const removedNumber = index + 1;
      state.cues.splice(index, 1);
      state.structureChanged = true;
      refreshCueIds();
      rebuildChangedSet();
      if (!state.cues.length) {
        state.activeIndex = -1;
      } else if (state.activeIndex === index) {
        state.activeIndex = Math.min(index, state.cues.length - 1);
      } else if (state.activeIndex > index) {
        state.activeIndex -= 1;
      }
      renderCueList();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
      statusMessage(`已刪除第 ${removedNumber} 句字幕`);
    }

    function mergeCueWithNext(index) {
      const current = state.cues[index];
      const next = state.cues[index + 1];
      if (!current || !next) {
        statusMessage("最後一句字幕沒有下一句可合併");
        return;
      }
      current.text = [current.text.trim(), next.text.trim()].filter(Boolean).join("\n");
      current.end = next.end;
      current.endRaw = next.endRaw;
      state.cues.splice(index + 1, 1);
      state.structureChanged = true;
      refreshCueIds();
      rebuildChangedSet();
      state.activeIndex = index;
      renderCueList();
      setActiveCue(index);
      updateBurnPreview();
      statusMessage(`已合併第 ${index + 1} 句與下一句字幕`);
    }

    function refreshCueIds() {
      state.cues.forEach((cue, index) => cue.id = index + 1);
    }

    function rebuildChangedSet() {
      state.changed.clear();
      state.cues.forEach((cue, index) => {
        const textChanged = cue.text !== cue.originalText;
        const timingChanged = Math.abs(cue.start - cue.originalStart) > 0.001 || Math.abs(cue.end - cue.originalEnd) > 0.001;
        if (textChanged || timingChanged) state.changed.add(index);
      });
    }

    function jumpToCueFromInput() {
      const cueNumber = Number.parseInt(el.jumpCueNumber.value, 10);
      if (!Number.isFinite(cueNumber)) {
        statusMessage("請輸入要跳轉的字幕段落編號");
        return;
      }
      const index = cueNumber - 1;
      if (!state.cues[index]) {
        statusMessage(`找不到第 ${cueNumber} 段字幕，目前共有 ${state.cues.length} 段`);
        return;
      }
      jumpToCue(index, { focusEditor: true, play: false });
    }

    function jumpToCue(index, options = {}) {
      const cue = state.cues[index];
      if (!cue) return;
      const { focusEditor = false, play = true } = options;
      if (state.search) {
        state.search = "";
        el.search.value = "";
        renderCueList();
      }
      setStage("proofread");
      seekToSeconds(cue.start);
      if (play && state.playerMode === "youtube" && state.youtubeReady && state.youtubePlayer?.playVideo) {
        state.youtubePlayer.playVideo();
      } else if (play && state.playerMode === "local") {
        el.video.play();
      }
      setActiveCue(index);
      scrollCueIntoView(index, focusEditor);
      statusMessage(`已跳至第 ${index + 1} 段字幕`);
    }

    function scrollCueIntoView(index, focusEditor = false) {
      const node = el.cueList.querySelector(`[data-index="${index}"]`);
      if (!node) return;
      node.scrollIntoView({ block: "center", behavior: "smooth" });
      if (focusEditor) {
        window.setTimeout(() => {
          const textarea = node.querySelector("textarea");
          textarea?.focus();
          textarea?.setSelectionRange(textarea.value.length, textarea.value.length);
        }, 120);
      }
    }

    function updateActiveCue(time = getPlaybackTime(), force = false) {
      const index = state.cues.findIndex((cue) => time >= cue.start && time <= cue.end);
      if (!force && index === state.activeIndex) return;
      setActiveCue(index);
    }

    function setActiveCue(index) {
      state.activeIndex = index;
      document.querySelectorAll(".cue.active").forEach((node) => node.classList.remove("active"));
      if (index >= 0) {
        const cue = state.cues[index];
        const node = el.cueList.querySelector(`[data-index="${index}"]`);
        if (node) node.classList.add("active");
        el.currentText.textContent = cue.text || " ";
        el.currentMeta.textContent = `#${index + 1} ${cue.startRaw} - ${cue.endRaw}`;
        el.currentRuleState.textContent = hasRuleWarning(cue.text) ? "待檢查" : "已校稿";
      } else {
        el.currentText.textContent = "目前沒有對應字幕";
        el.currentMeta.textContent = "尚未選取字幕";
        el.currentRuleState.textContent = "等待播放";
      }
      updateBurnPreview();
    }

    function applyRulesToAll() {
      const beforeCount = state.cues.length;
      state.cues = state.cues.map((cue, index) => {
        const text = cleanSubtitleText(cue.text);
        return { ...cue, text };
      }).filter((cue) => cue.text.trim());
      if (state.cues.length !== beforeCount) state.structureChanged = true;
      refreshCueIds();
      rebuildChangedSet();
      renderCueList();
      updateActiveCue(getPlaybackTime(), true);
      updateBurnPreview();
      statusMessage("已套用內建清理規則，請再次人工確認");
    }

    function cleanSubtitleText(value) {
      let text = value.trim();
      for (const [pattern, replacement] of termRules) text = text.replace(pattern, replacement);
      text = convertChineseNumbers(text);
      text = normalizePronouns(text);
      text = text.replace(fillerPatternGlobal, "  ");
      text = text.replace(/所以呢/g, "所以");
      text = text.replace(/之後呢/g, "之後");
      text = text.replace(/的話呢/g, "的話");
      text = text.replace(/時候呢/g, "時候");
      text = text.replace(/這邊呢/g, "這邊");
      text = text.replace(/老師呢/g, "老師");
      text = text.replace(disallowedPunctuationPatternGlobal, "  ");
      text = text.replace(/\t/g, " ").replace(/ {3,}/g, "  ").replace(/^ +| +$/g, "").replace(/\s+([？！])/g, "$1");
      return text;
    }

    function convertChineseNumbers(value) {
      return value.replace(/[零〇一二兩三四五六七八九十百千]+(?=(分鐘|秒|小時|個|段|次|種|年|月|日|點))/g, (match) => {
        const converted = parseChineseNumber(match);
        return converted === null ? match : String(converted);
      });
    }

    function parseChineseNumber(value) {
      const digit = {
        "零": 0,
        "〇": 0,
        "一": 1,
        "二": 2,
        "兩": 2,
        "三": 3,
        "四": 4,
        "五": 5,
        "六": 6,
        "七": 7,
        "八": 8,
        "九": 9
      };

      if ([...value].every((char) => char in digit)) {
        return Number([...value].map((char) => digit[char]).join(""));
      }

      if (value === "十") return 10;
      const tens = value.match(/^([一二兩三四五六七八九])?十([一二兩三四五六七八九])?$/);
      if (tens) {
        const left = tens[1] ? digit[tens[1]] : 1;
        const right = tens[2] ? digit[tens[2]] : 0;
        return left * 10 + right;
      }

      return null;
    }

    function normalizePronouns(value) {
      return value.replace(/他/g, "它");
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function hasRuleWarning(text) {
      return fillerPattern.test(text) ||
        disallowedPunctuationPattern.test(text) ||
        /\b(whisper|openai|api|ai|moodle|token|default|lms|evercam|kmplus)\b/i.test(text);
    }

    function updateStats() {
      el.cueCount.textContent = String(state.cues.length);
      el.changedCount.textContent = String(state.changed.size + (state.structureChanged ? 1 : 0));
      el.warningCount.textContent = String(state.cues.filter((cue) => hasRuleWarning(cue.text)).length);
      el.jumpCueNumber.max = String(Math.max(1, state.cues.length));
    }

    function getBurnSettings() {
      const settings = Object.fromEntries(settingIds.map((id) => [id, document.getElementById(id).value]));
      return {
        fontFamily: settings.fontFamily,
        fontSize: Number(settings.fontSize),
        fontColor: settings.fontColor,
        outlineColor: settings.outlineColor,
        outlineWidth: Number(settings.outlineWidth),
        position: settings.subtitlePosition,
        marginV: Number(settings.marginV),
        bold: settings.bold === "1",
        alignment: settings.subtitlePosition === "top" ? 8 : settings.subtitlePosition === "middle" ? 5 : 2,
        outputFolder,
        subtitleFile: `${outputFolder}/media.edited.srt`,
        settingsFile: `${outputFolder}/burn-settings.json`
      };
    }

    function updateBurnPreview() {
      const settings = getBurnSettings();
      const cue = state.activeIndex >= 0 ? state.cues[state.activeIndex] : null;
      el.burnCaption.textContent = cue?.text || "字幕燒錄樣式預覽";
      el.burnCaption.style.fontFamily = `"${settings.fontFamily}", sans-serif`;
      el.burnCaption.style.fontSize = `${settings.fontSize}px`;
      el.burnCaption.style.fontWeight = settings.bold ? "700" : "400";
      el.burnCaption.style.color = settings.fontColor;
      el.burnCaption.style.webkitTextStroke = `${settings.outlineWidth}px ${settings.outlineColor}`;
      el.burnOverlay.style.top = settings.position === "top" ? `${settings.marginV}px` : settings.position === "middle" ? "0" : "";
      el.burnOverlay.style.bottom = settings.position === "bottom" ? `${settings.marginV}px` : "";
      el.burnOverlay.style.alignItems = settings.position === "middle" ? "center" : "";
      el.burnOverlay.style.height = settings.position === "middle" ? "100%" : "";
      el.commandBox.textContent = [
        "npm run sample:subtitles -- workspace/media.mp4 workspace/review-output/media.edited.srt workspace/review-output/media_subtitled_sample_20s.mp4 --settings workspace/review-output/burn-settings.json",
        "npm run burn:subtitles -- workspace/media.mp4 workspace/review-output/media.edited.srt workspace/review-output/media_subtitled.mp4 --settings workspace/review-output/burn-settings.json"
      ].join("\n\n");
    }

    async function saveReviewPackage() {
      const payload = {
        subtitle: buildSrt(),
        settings: getBurnSettings(),
        manifest: {
          savedAt: new Date().toISOString(),
          cueCount: state.cues.length,
          changedCount: state.changed.size + (state.structureChanged ? 1 : 0),
          structureChanged: state.structureChanged,
          warningCount: state.cues.filter((cue) => hasRuleWarning(cue.text)).length,
          sourceVideo: state.videoPath,
          sourceSubtitle: state.srtPath,
          outputFolder
        }
      };
      const response = await fetch("/api/save-review-package", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        statusMessage(`儲存失敗：HTTP ${response.status}`);
        return;
      }
      const result = await response.json();
      statusMessage(`已儲存校稿包：${result.folder}`);
      setStage("burn");
    }

    function buildSrt() {
      return state.cues.map((cue, index) => `${index + 1}\n${cue.startRaw} --> ${cue.endRaw}\n${cue.text.trim()}`).join("\n\n") + "\n";
    }

    function downloadSrt() {
      const blob = new Blob([buildSrt()], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "media.edited.srt";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      statusMessage("已下載 SRT");
    }

    async function saveSrt() {
      if (!window.showSaveFilePicker) {
        downloadSrt();
        statusMessage("瀏覽器不支援直接另存，已改用下載 SRT");
        return;
      }
      const handle = await window.showSaveFilePicker({
        suggestedName: "media.edited.srt",
        types: [{ description: "SRT subtitle", accept: { "text/plain": [".srt"] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(buildSrt());
      await writable.close();
      statusMessage("已另存 SRT");
    }

    function parseTime(value) {
      const [hh, mm, rest] = value.split(":");
      const [ss, ms] = rest.split(",");
      return Number(hh) * 3600 + Number(mm) * 60 + Number(ss) + Number(ms) / 1000;
    }

    function formatSrtTime(seconds) {
      const safeSeconds = Math.max(0, Number.isFinite(seconds) ? seconds : 0);
      const totalMs = Math.round(safeSeconds * 1000);
      const hh = String(Math.floor(totalMs / 3600000)).padStart(2, "0");
      const mm = String(Math.floor((totalMs % 3600000) / 60000)).padStart(2, "0");
      const ss = String(Math.floor((totalMs % 60000) / 1000)).padStart(2, "0");
      const ms = String(totalMs % 1000).padStart(3, "0");
      return `${hh}:${mm}:${ss},${ms}`;
    }

    function formatDuration(seconds) {
      return `${Math.max(0, seconds).toFixed(1)} 秒`;
    }

    function roundTime(seconds) {
      return Math.round(seconds * 1000) / 1000;
    }

    function formatClock(seconds) {
      if (!Number.isFinite(seconds)) return "00:00";
      const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
      const ss = String(Math.floor(seconds % 60)).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function escapeHtml(value) {
      return value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function statusMessage(message) {
      el.status.textContent = message;
    }
  </script>
</body>
</html>
